[tox]
envlist =
	#py38-django{22,31,32}
	#py39-django{32,42,master}
	py310-django{42,52}
    py312-django{42,52,60}
    py313-django{52,60,master}
	checkqa

[testenv]
setenv =
	PYTHONWARNINGS = all
deps =
	coverage
	six
	django41: Django==4.2.*
	django52: Django==5.2.*
	django60: Django==6.0.*
    djangomaster: https://api.github.com/repos/django/django/tarball/master
commands =
	pip install -r {toxinidir}/requirements.txt
	coverage run manage.py test {posargs:iarp_django_utils}
	coverage report
	coverage html

[coverage:run]
include = iarp_django_utils*
omit =
    iarp_django_utils/tests/*

[testenv:checkqa]
skip_install = True
# ignore_errors = True
deps =
    isort==6.0.1
    black==25.1.0
    flake8==7.2.0
    flake8-pyproject==1.2.3
commands =
    flake8 {posargs:{toxinidir}/iarp_django_utils}
    isort --check-only --diff {posargs:{toxinidir}/iarp_django_utils}
    black --check --diff {posargs:{toxinidir}/iarp_django_utils} --exclude tests

[flake8]
max-line-length=120
exclude =
	iarp_django_utils\tests\*
	tests
extend-ignore=
	E266

[isort]
indent=4
profile=black
combine_star=1
combine_as_imports=1
include_trailing_comma=1
multi_line_output=3
lines_after_imports=2
known_django=django
extra_standard_library=types,requests
sections=FUTURE,STDLIB,DJANGO,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
skip=tests
